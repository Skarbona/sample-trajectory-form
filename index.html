<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trajectory Form — Demos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'media' };
  </script>
</head>
<body class="min-h-screen bg-zinc-100 p-8 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-50">
  <main class="mx-auto max-w-lg">
    <h1 class="text-2xl font-bold">Trajectory Form</h1>
    <p class="mt-2 text-zinc-600 dark:text-zinc-400">Wybierz wersję demo:</p>

    <ul class="mt-6 flex flex-col gap-3">
      <li>
        <a
          href="version-1-vanilla/"
          class="block rounded-lg border border-zinc-200 bg-white px-4 py-3 shadow-sm transition-colors hover:border-blue-500 dark:border-zinc-700 dark:bg-zinc-900 dark:hover:border-blue-400"
        >
          <span class="font-semibold">Version 1</span>
          <span class="mt-0.5 block text-sm text-zinc-500">Vanilla HTML + JS</span>
        </a>
      </li>
      <li>
        <a
          href="version-2-react/"
          class="block rounded-lg border border-zinc-200 bg-white px-4 py-3 shadow-sm transition-colors hover:border-blue-500 dark:border-zinc-700 dark:bg-zinc-900 dark:hover:border-blue-400"
        >
          <span class="font-semibold">Version 2</span>
          <span class="mt-0.5 block text-sm text-zinc-500">React (CDN)</span>
        </a>
      </li>
      <li>
        <a
          href="version-3-alpine/"
          class="block rounded-lg border border-zinc-200 bg-white px-4 py-3 shadow-sm transition-colors hover:border-blue-500 dark:border-zinc-700 dark:bg-zinc-900 dark:hover:border-blue-400"
        >
          <span class="font-semibold">Version 3</span>
          <span class="mt-0.5 block text-sm text-zinc-500">Alpine.js (CDN)</span>
        </a>
      </li>
    </ul>
  </main>

</html>
