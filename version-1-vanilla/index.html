<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trajectory Form — Vanilla</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'media' };
  </script>
</head>
<body class="min-h-screen bg-zinc-100 p-6 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-50">
  <div class="mx-auto max-w-xl rounded-xl border border-zinc-200 bg-white p-6 shadow-sm dark:border-zinc-700 dark:bg-zinc-900">
    <nav class="mb-6 flex gap-2 border-b border-zinc-200 pb-4 dark:border-zinc-700" role="tablist" aria-label="Form options">
      <button
        type="button"
        class="nav-btn flex-1 rounded-lg bg-zinc-900 px-4 py-2.5 text-sm font-medium text-white dark:bg-zinc-100 dark:text-zinc-900"
        data-option="one"
        role="tab"
        aria-selected="true"
      >
        Option One
      </button>
      <button
        type="button"
        class="nav-btn flex-1 rounded-lg px-4 py-2.5 text-sm font-medium text-zinc-600 transition-colors hover:bg-zinc-100 dark:text-zinc-400 dark:hover:bg-zinc-800"
        data-option="two"
        role="tab"
        aria-selected="false"
      >
        Option Two
      </button>
    </nav>

    <section id="option-one" class="flex flex-col gap-5" role="tabpanel">
      <label class="flex flex-col gap-2">
        <span class="text-sm font-bold">All Issues</span>
        <textarea
          id="all-issues"
          rows="12"
          class="w-full resize-y rounded-lg border border-zinc-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:border-zinc-600 dark:bg-zinc-950 dark:focus:ring-blue-400"
        >(high) description of biggest error in trajectory
(medium) another meaningful error....etc
(medium) description of another error...</textarea>
      </label>

      <label class="flex flex-col gap-2">
        <span class="text-sm font-medium text-zinc-700 dark:text-zinc-300">Trajectory Quality</span>
        <div class="flex items-center gap-4">
          <input
            type="range"
            id="trajectory-one"
            class="h-2 flex-1 cursor-pointer accent-blue-600"
            min="1"
            max="5"
            step="1"
            value="3"
          />
          <output id="trajectory-one-out" class="w-8 text-center text-sm font-semibold tabular-nums" for="trajectory-one">3</output>
        </div>
      </label>
    </section>

    <section id="option-two" class="hidden flex-col gap-5" role="tabpanel" hidden>
      <label class="flex flex-col gap-2">
        <span class="text-sm font-medium text-zinc-700 dark:text-zinc-300">Trajectory Quality</span>
        <div class="flex items-center gap-4">
          <input
            type="range"
            id="trajectory-two-top"
            class="h-2 flex-1 cursor-pointer accent-blue-600"
            min="1"
            max="5"
            step="1"
            value="3"
          />
          <output id="trajectory-two-top-out" class="w-8 text-center text-sm font-semibold tabular-nums" for="trajectory-two-top">3</output>
        </div>
      </label>

      <div id="issues-list" class="flex flex-col gap-4"></div>

      <button
        type="button"
        id="add-issue"
        class="w-full rounded-lg border-2 border-dashed border-zinc-300 px-4 py-3 text-sm transition-colors hover:bg-zinc-50 dark:border-zinc-600 dark:hover:bg-zinc-800"
      >
        <strong>Add new Issue</strong>
      </button>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
